name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.public-packages.outputs.packages }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Validate lockstep version
        run: python3 scripts/workspace.py check-version "${GITHUB_REF_NAME#v}"

      - name: Resolve public package matrix
        id: public-packages
        run: echo "packages=$(python3 scripts/workspace.py matrix --scope public)" >> "$GITHUB_OUTPUT"

      - name: Build public distributions
        run: |
          python3 - <<'PY'
          import json
          import shutil
          import subprocess
          from pathlib import Path

          packages = json.loads(subprocess.check_output(
              ["python3", "scripts/workspace.py", "matrix", "--scope", "public"],
              text=True,
          ))

          dist_root = Path("dist")
          if dist_root.exists():
              shutil.rmtree(dist_root)
          dist_root.mkdir()

          # Flat directory for all wheels so sibling deps can resolve via --find-links
          all_wheels = dist_root / "_all_wheels"
          all_wheels.mkdir()

          for package in packages:
              package_dist = dist_root / package["dist_name"]
              package_dist.mkdir()
              subprocess.run(
                  ["uv", "build", "--package", package["dist_name"], "--no-sources"],
                  check=True,
              )
              built = sorted(Path("dist").glob("*.whl")) + sorted(Path("dist").glob("*.tar.gz"))
              for artifact in built:
                  dest = package_dist / artifact.name
                  artifact.rename(dest)
                  # Copy wheels to the shared directory for sibling resolution
                  if dest.suffix == ".whl":
                      shutil.copy2(dest, all_wheels / dest.name)

          # Smoke-test each package (with sibling deps available via --find-links)
          for package in packages:
              package_dist = dist_root / package["dist_name"]
              for ext in ("*.whl", "*.tar.gz"):
                  artifact = next(package_dist.glob(ext))
                  subprocess.run(
                      [
                          "uv",
                          "run",
                          "--isolated",
                          "--no-project",
                          "--find-links", str(all_wheels),
                          "--with",
                          str(artifact),
                          "--",
                          "python",
                          "scripts/smoke_test_package.py",
                          package["import_name"],
                      ],
                      check=True,
                  )

          # Clean up helper directory (not needed in the upload artifact)
          shutil.rmtree(all_wheels)
          PY

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: public-dists
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.build.outputs.packages) }}
    environment:
      name: pypi
      url: https://pypi.org/p/${{ matrix.package.dist_name }}

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: public-dists
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/${{ matrix.package.dist_name }}
          password: ${{ secrets.PYPI_TOKEN }}
